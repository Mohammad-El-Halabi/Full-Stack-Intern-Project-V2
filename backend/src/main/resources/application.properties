# ============================================================
#  E-commerce API - application configuration
# ============================================================
spring.application.name=ecommerce-api
server.port=8080

# ------------------------------------------------------------
#  Datasource (MySQL 8)
#  Override any of these with environment variables when needed:
#    DB_URL, DB_USERNAME, DB_PASSWORD
# ------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------------------------------
#  JPA / Hibernate
#  'validate' checks that the schema.sql tables match the entities.
#  Use 'update' during development if you prefer Hibernate to
#  create/alter the tables for you instead of running schema.sql.
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ------------------------------------------------------------
#  JSON / pagination defaults
# ------------------------------------------------------------
spring.jackson.default-property-inclusion=non_null
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100
